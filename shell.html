<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Gravity Sandbox</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; border: none; outline: none; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: rgba(255, 255, 255, 0.8);
            user-select: none; pointer-events: none; text-shadow: 1px 1px 2px black;
        }
        #ui h2 { margin: 0 0 10px 0; font-size: 24px; font-weight: normal; color: white; }
        #ui p { margin: 4px 0; font-size: 14px; }
        #ui .key { color: #88ccff; font-weight: bold; }
        /* Hide Emscripten's default loading text/spinners completely so it loads cleanly */
        #status, #progress, #spinner, figure { display: none !important; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Cinematic Sandbox</h2>
        <p><span class="key">Hold Right Click + Drag</span>: Look Around</p>
        <p><span class="key">W,A,S,D</span>: Fly | <span class="key">Q / E</span>: Elevation</p>
        <p><span class="key">Hold LEFT Click + DRAG</span>: Slingshot Aim Planet</p>
        <p><span class="key">Release Left Click</span>: Launch Planet</p>
        <p><span class="key">K</span>: Pause Physics</p>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    
    <script type="text/javascript">
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function(e) { 
                    alert('WebGL context lost. You will need to reload the page.'); 
                    e.preventDefault(); 
                }, false);
                return canvas;
            })(),
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); }
        };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
